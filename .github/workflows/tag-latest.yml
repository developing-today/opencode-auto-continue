name: Build, tag and release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: |
          SHA=$(git rev-parse HEAD)
          SHORT=$(git rev-parse --short HEAD)
          UTC=$(date -u +%Y%m%dT%H%M%SZ)
          DATED_TAG="${UTC}-${SHORT}"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"
          echo "dated_tag=$DATED_TAG" >> "$GITHUB_OUTPUT"

      - name: Push tags
        run: |
          git tag -f latest HEAD
          git tag "${{ steps.vars.outputs.dated_tag }}" HEAD
          git push origin latest "${{ steps.vars.outputs.dated_tag }}" --force

      - name: Compute content hash from tag tarball (same URL bun downloads)
        id: hash
        run: |
          # Must use the refs/tags/latest URL — same tarball bun fetches
          # The root dir in the tar is "opencode-auto-continue-latest/" vs
          # "opencode-auto-continue-<sha>/" for commit URLs, so hashes differ.
          TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/latest.tar.gz"
          # Retry a few times in case GitHub hasn't updated the tag tarball yet
          for i in 1 2 3 4 5; do
            HASH=$(curl -sL "$TARBALL_URL" | openssl dgst -sha512 -binary | openssl base64 -A)
            if [ -n "$HASH" ]; then
              break
            fi
            echo "Attempt $i: empty hash, retrying in 2s..."
            sleep 2
          done
          SRI="sha512-${HASH}"
          echo "content_hash=$SRI" >> "$GITHUB_OUTPUT"

      - name: Create dated release (marked as latest)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.vars.outputs.dated_tag }}" \
            --title "${{ steps.vars.outputs.dated_tag }}" \
            --latest \
            --notes "${{ steps.hash.outputs.content_hash }}
          
          Commit: ${{ steps.vars.outputs.sha }}
          Repository: https://github.com/${{ github.repository }}"

      - name: Create/update latest release (not marked as latest)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Delete existing latest release if present
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest \
            --title "latest" \
            --notes "${{ steps.hash.outputs.content_hash }}
          
          Commit: ${{ steps.vars.outputs.sha }}
          Points to same content as ${{ steps.vars.outputs.dated_tag }}"
