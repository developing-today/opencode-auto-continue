name: Update latest tag

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Force-update latest tags
        run: |
          git tag -f latest HEAD
          git tag -f "@latest" HEAD
          git push origin latest "@latest" --force
